<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Blackjack 29 - Pro Version</title>
<style>
:root { --gold: #ffd700; --bg: #0a192f; --red: #ff4444; --green: #1a7a4a; --neon-green: #39ff14; --gray: #444; --card-bg: #000; --blue: #2196F3; }
body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }

.table-container { display: flex; justify-content: center; align-items: center; height: 80vh; }
.table {
  position: relative; width: 92vw; max-width: 360px; height: 70vh;     
  background: radial-gradient(circle at center, #1e3c72 0%, #0a192f 100%);
  border-radius: 150px; border: 8px solid #050a14; box-shadow: inset 0 0 40px #000;
}

/* Կենտրոնի թվերը՝ իրար շատ մոտիկ */
#centralArea {
  position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
  display: flex; gap: -5px; justify-content: center; align-items: center; z-index: 100;
}

.center-card {
    width: 38px; height: 54px; background: var(--card-bg); 
    border: 2px solid var(--blue); border-radius: 50%;
    color: #fff; display: flex; align-items: center; justify-content: center; 
    font-weight: 900; font-size: 34px; box-shadow: 0 0 10px rgba(33, 150, 243, 0.4);
    margin: 0 -2px; /* Քիփ ենք դնում */
    animation: pop 0.2s ease-out forwards;
}

@keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

/* Խաղացողի սլոթը */
.seat-slot {
  position: absolute; transform: translate(-50%, -50%);
  width: 80px; height: 115px; display: flex; flex-direction: column; align-items: center;
  z-index: 5; transition: all 0.3s ease; cursor: pointer;
}

/* Շրջանակը հայտնվում է միայն երբ անուն կա */
.has-player {
    border: 1.2px solid rgba(255,255,255,0.1); border-radius: 12px;
    background: rgba(0,0,0,0.3);
}

.seat-slot.selected.has-player { 
    border: 2px solid var(--neon-green); 
    box-shadow: 0 0 12px var(--neon-green); 
    background: rgba(57, 255, 20, 0.08);
}

.name-box { width: 100%; padding: 4px 0; border-radius: 10px 10px 0 0; background: rgba(0,0,0,0.6); }
.name-tag { color: var(--gold); font-size: 11px; font-weight: bold; }

.cards-container { 
    position: relative; width: 70px; height: 50px; margin-top: 8px;
    display: flex; justify-content: center;
}

.card-circle { 
    width: 32px; height: 46px; background: var(--card-bg); 
    border: 1.5px solid var(--gray); border-radius: 50%;
    color: #fff; display: flex; align-items: center; justify-content: center; 
    font-weight: 900; font-size: 28px; position: absolute;
}

.card-0 { left: 2px; z-index: 1; }
.card-1 { left: 36px; z-index: 2; }
.card-extra { z-index: 10; border-color: var(--gold); }

.status-area { height: 22px; display: flex; align-items: center; justify-content: center; width: 100%; margin-top: auto; padding-bottom: 4px; }
.score-tag { color: #fff; font-size: 15px; font-weight: 900; }
.bust-label { color: var(--red); font-size: 10px; font-weight: bold; }

.controls { position: fixed; bottom: 10px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 0 10px; box-sizing: border-box; }
.btn-group { display: flex; gap: 8px; width: 100%; justify-content: center; }
.main-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; background: var(--green); font-size: 12px; max-width: 110px; }

/* Անիմացիոն թռիչք */
.flying-card {
  position: fixed; z-index: 9999; pointer-events: none;
  width: 38px; height: 54px; background: var(--card-bg); border: 2px solid var(--blue); border-radius: 50%;
  color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 34px;
  transition: all 0.5s ease-in;
}

.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000;
}
.modal-content { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 2px solid var(--gold); width: 260px; text-align: center; }
.modal-input { width: 80%; padding: 10px; margin: 15px 0; border-radius: 8px; border: 1px solid var(--gray); background: #000; color: #fff; text-align: center; font-size: 18px; }
</style>
</head>
<body>

<div id="addModal" class="modal-overlay">
  <div class="modal-content">
    <h3 style="color:var(--gold); margin:0;">ՆՈՐ ԽԱՂԱՑՈՂ</h3>
    <input type="text" id="playerNameInput" class="modal-input" placeholder="Անուն">
    <button class="main-btn" onclick="confirmAddPlayer()">ԱՎԵԼԱՑՆԵԼ</button>
  </div>
</div>

<div class="table-container">
  <div class="table" id="mainTable">
    <div id="centralArea"></div>
  </div>
</div>

<div class="controls">
    <div class="btn-group">
        <button id="addCardBtn" class="main-btn" style="background: var(--blue);" onclick="addCardToCenter()">+ ԹԻՎ</button>
        <button class="main-btn" style="background: var(--red);" onclick="sendCardsToPlayer()">STOP</button>
    </div>
    <div class="btn-group">
        <button class="main-btn" style="background:#444;" onclick="resetTable()">ՄԱՔՐԵԼ</button>
        <button class="main-btn" onclick="dealInitial()">ԲԱԺԱՆԵԼ</button>
    </div>
</div>

<script>
let seats = [];
let selectedSeatIndex = -1;
let currentAddingIndex = null;
let centralCards = [];

function setupSlots() {
  const t = document.getElementById("mainTable");
  for(let i=0; i<9; i++){
    let angle = (2 * Math.PI / 9) * i + Math.PI/2;
    let r = (i === 2 || i === 7 || i === 0) ? 42 : 46;
    let x = 50 + r * Math.cos(angle); 
    let y = 50 + ((i === 2 || i === 7) ? 64 : 48) * Math.sin(angle);
    
    seats[i] = { name: null, cards: [], score: 0, isDone: false };
    let slot = document.createElement("div");
    slot.className = "seat-slot";
    slot.id = "slot" + i;
    slot.style.left = x + "%"; slot.style.top = y + "%";
    slot.onclick = () => selectSeat(i);
    slot.innerHTML = `<span style="margin-top:40px; color:rgba(255,255,255,0.15); font-size:35px;">+</span>`;
    t.appendChild(slot);
  }
}

function openAddModal(i) {
  currentAddingIndex = i;
  document.getElementById('addModal').style.display = 'flex';
}

function confirmAddPlayer() {
  let name = document.getElementById('playerNameInput').value;
  if(name && currentAddingIndex !== null) {
    seats[currentAddingIndex].name = name;
    document.getElementById("slot" + currentAddingIndex).classList.add('has-player');
    renderSeat(currentAddingIndex);
    document.getElementById('addModal').style.display = 'none';
    document.getElementById('playerNameInput').value = '';
    selectSeat(currentAddingIndex);
  }
}

function selectSeat(i) {
    if(!seats[i].name) { openAddModal(i); return; }
    selectedSeatIndex = i;
    document.querySelectorAll('.seat-slot').forEach((s, idx) => {
        s.classList.toggle('selected', idx === i);
    });
    checkButtons();
}

function checkButtons() {
    let btn = document.getElementById('addCardBtn');
    if(selectedSeatIndex !== -1) {
        let s = seats[selectedSeatIndex];
        let currentTotal = s.score + centralCards.reduce((a, b) => a + b, 0);
        if (currentTotal > 29 || s.isDone) {
            btn.style.opacity = '0.3';
            btn.style.pointerEvents = 'none';
        } else {
            btn.style.opacity = '1';
            btn.style.pointerEvents = 'auto';
        }
    }
}

function renderSeat(i) {
  let s = seats[i];
  let slot = document.getElementById("slot" + i);
  if(!s.name) return;
  
  let currentTotal = s.score;
  if (i === selectedSeatIndex) {
      currentTotal += centralCards.reduce((a, b) => a + b, 0);
  }

  let isBust = currentTotal > 29;
  
  let cardsHtml = s.cards.map((c, idx) => {
      let className = "card-circle";
      let style = "";
      if (idx === 0) className += " card-0";
      else if (idx === 1) className += " card-1";
      else {
          className += " card-extra";
          let targetX = (idx % 2 === 0) ? 2 : 36;
          let targetY = (Math.floor(idx / 2) * 6);
          style = `style="left: ${targetX}px; top: ${targetY}px; z-index: ${10 + idx};"`;
      }
      return `<div class="${className}" ${style}>${c}</div>`;
  }).join('');

  slot.innerHTML = `
    <div class="name-box"><span class="name-tag">${s.name}</span></div>
    <div class="cards-container">${cardsHtml}</div>
    <div class="status-area">
        ${isBust ? '<span class="bust-label">ՎԱՌՎԱԾ</span>' : `<span class="score-tag">${currentTotal}</span>`}
    </div>
  `;
}

function addCardToCenter() {
    if(selectedSeatIndex === -1) return;
    let s = seats[selectedSeatIndex];
    let currentTotal = s.score + centralCards.reduce((a, b) => a + b, 0);
    
    if(currentTotal >= 29 || s.isDone) return;

    let val = Math.floor(Math.random() * 9) + 1;
    centralCards.push(val);
    
    let cardEl = document.createElement('div');
    cardEl.className = 'center-card';
    cardEl.innerText = val;
    document.getElementById('centralArea').appendChild(cardEl);
    
    renderSeat(selectedSeatIndex);
    checkButtons();
}

function sendCardsToPlayer() {
    if(selectedSeatIndex === -1 || centralCards.length === 0) return;
    const s = seats[selectedSeatIndex];
    const centerArea = document.getElementById('centralArea');
    const cards = centerArea.querySelectorAll('.center-card');
    const targetSlot = document.getElementById("slot" + selectedSeatIndex);
    const targetRect = targetSlot.getBoundingClientRect();

    cards.forEach((cardEl, index) => {
        const rect = cardEl.getBoundingClientRect();
        const clone = document.createElement('div');
        clone.className = 'flying-card';
        clone.innerText = cardEl.innerText;
        clone.style.left = rect.left + 'px';
        clone.style.top = rect.top + 'px';
        document.body.appendChild(clone);
        cardEl.style.visibility = 'hidden';

        setTimeout(() => {
            clone.style.left = (targetRect.left + 20) + 'px';
            clone.style.top = (targetRect.top + 40) + 'px';
            clone.style.transform = 'scale(0.6)';
            clone.style.opacity = '0';
        }, index * 100);

        setTimeout(() => clone.remove(), 550);
    });

    setTimeout(() => {
        s.score += centralCards.reduce((a, b) => a + b, 0);
        s.cards.push(...centralCards);
        if(s.score > 29) s.isDone = true;
        centralCards = [];
        centerArea.innerHTML = '';
        renderSeat(selectedSeatIndex);
        checkButtons();
    }, 600);
}

function dealInitial() {
    seats.forEach((s, i) => {
        if(s.name) {
            s.cards = [Math.floor(Math.random() * 9) + 1, Math.floor(Math.random() * 9) + 1];
            s.score = s.cards[0] + s.cards[1];
            s.isDone = s.score > 29;
            renderSeat(i);
        }
    });
    checkButtons();
}

function resetTable() {
    seats.forEach((s, i) => {
        if(s.name) {
            s.cards = []; s.score = 0; s.isDone = false;
            renderSeat(i);
        }
    });
    document.getElementById('centralArea').innerHTML = '';
    centralCards = [];
    checkButtons();
}

setupSlots();
</script>
</body>
</html>
